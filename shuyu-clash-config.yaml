# profile-name: shuyu-clash-config
# 订阅链接（国内可访问转发）：https://cdn.jsdelivr.net/gh/ShiningInfo/climb-the-wall@main/shuyu-clash-config.yaml
port: 7890
socks-port: 7891
allow-lan: true
mode: rule
log-level: info
ipv6: false
external-controller: '127.0.0.1:9090'

# 1. 订阅资源
proxy-providers:
  CuteCloud:
    type: http
    url: "https://sublink.cute-cloud.de/link?token=9853b4d94c514fcd95f7cca467140aa6"
    interval: 3600
    path: ./sub1.yaml
    health-check: {enable: true, interval: 600, url: "http://www.gstatic.com/generate_204"}

# 2. 策略组
proxy-groups:
  # --- 顶层选择 ---
  - name: 🚀 节点选择
    type: select
    proxies:
      - ⚡ 全局自动
      - 📦 99 订阅
      - 🇭🇰 香港地区
      - 🇯🇵 日本地区
      - 🇺🇸 美国地区
      - 🇸🇬 新加坡地区
      - 🇹🇼 台湾地区
      - 🇰🇷 韩国地区
      - DIRECT

  - name: ⚡ 全局自动
    type: url-test
    use:
      - CuteCloud
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50

  # --- 按订阅分组：组内可手动选节点，也可先走该订阅自动测速 ---
  - name: 📦 99 订阅
    type: select
    proxies:
      - ⚡ 99 自动
    use:
      - CuteCloud

  - name: ⚡ 99 自动
    type: url-test
    hidden: true
    use:
      - CuteCloud
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50

  # --- 地区详情组（注意这里：固定项和订阅拉取分写） ---
  - name: 🇭🇰 香港地区
    type: select
    proxies: 
      - 🇭🇰 香港-自动测速
      - DIRECT
    use:
      - CuteCloud
    filter: '(?i)(香港|\bHK\b|HKG|Hong[ -]?Kong|HKBN|HKT)'

  - name: 🇭🇰 香港-自动测速
    type: url-test
    hidden: true
    use:
      - CuteCloud
    filter: '(?i)(香港|\bHK\b|HKG|Hong[ -]?Kong|HKBN|HKT)'
    url: https://www.netflix.com/hk-en/
    interval: 300

  - name: 🇯🇵 日本地区
    type: select
    proxies: 
      - 🇯🇵 日本-自动测速
      - DIRECT
    use:
      - CuteCloud
    filter: '(?i)(日本|\bJP\b|JPN|Japan|Tokyo|Osaka|东京|大阪)'

  - name: 🇯🇵 日本-自动测速
    type: url-test
    hidden: true
    use:
      - CuteCloud
    filter: '(?i)(日本|\bJP\b|JPN|Japan|Tokyo|Osaka|东京|大阪)'
    url: https://www.netflix.com/jp-en/
    interval: 300

  - name: 🇺🇸 美国地区
    type: select
    proxies: 
      - 🇺🇸 美国-自动测速
      - DIRECT
    use:
      - CuteCloud
    filter: '(?i)(美国|\bUS\b|USA|United States|America|New York|Los Angeles|San Jose|Seattle|Dallas|Chicago|Ashburn|Silicon Valley|Fremont|Phoenix)'

  - name: 🇺🇸 美国-自动测速
    type: url-test
    hidden: true
    use:
      - CuteCloud
    filter: '(?i)(美国|\bUS\b|USA|United States|America|New York|Los Angeles|San Jose|Seattle|Dallas|Chicago|Ashburn|Silicon Valley|Fremont|Phoenix)'
    url: https://www.netflix.com/
    interval: 300

  - name: 🇸🇬 新加坡地区
    type: select
    proxies: 
      - 🇸🇬 新加坡-自动测速
      - DIRECT
    use:
      - CuteCloud
    filter: '(?i)(新加坡|\bSG\b|SGP|Singapore|SIN|狮城)'

  - name: 🇸🇬 新加坡-自动测速
    type: url-test
    hidden: true
    use:
      - CuteCloud
    filter: '(?i)(新加坡|\bSG\b|SGP|Singapore|SIN|狮城)'
    url: https://www.netflix.com/sg/
    interval: 300

  - name: 🇹🇼 台湾地区
    type: select
    proxies:
      - 🇹🇼 台湾-自动测速
      - DIRECT
    use:
      - CuteCloud
    filter: '(?i)(台湾|台灣|\bTW\b|TWN|Taiwan|Taipei|台北|新北|Taichung)'

  - name: 🇹🇼 台湾-自动测速
    type: url-test
    hidden: true
    use:
      - CuteCloud
    filter: '(?i)(台湾|台灣|\bTW\b|TWN|Taiwan|Taipei|台北|新北|Taichung)'
    url: https://www.netflix.com/tw/
    interval: 300

  - name: 🇰🇷 韩国地区
    type: select
    proxies:
      - 🇰🇷 韩国-自动测速
      - DIRECT
    use:
      - CuteCloud
    filter: '(?i)(韩国|韓國|\bKR\b|KOR|Korea|Seoul|首尔|首爾|Busan|釜山)'

  - name: 🇰🇷 韩国-自动测速
    type: url-test
    hidden: true
    use:
      - CuteCloud
    filter: '(?i)(韩国|韓國|\bKR\b|KOR|Korea|Seoul|首尔|首爾|Busan|釜山)'
    url: https://www.netflix.com/kr/
    interval: 300

  # --- 业务逻辑层 ---
  - name: 🤖 AI 工具
    type: select
    proxies:
      - 🇺🇸 美国地区
      - 🇸🇬 新加坡地区
      - 🇯🇵 日本地区
      - 🇭🇰 香港地区
      - 🚀 节点选择
      - DIRECT

  - name: Ⓜ️ 微软服务
    type: select
    proxies:
      - DIRECT
      - 🇭🇰 香港地区
      - 🇯🇵 日本地区
      - 🇸🇬 新加坡地区
      - 🇺🇸 美国地区
      - 🚀 节点选择

  - name: 🍏 Apple 通用服务
    type: select
    proxies:
      - DIRECT
      - 🇭🇰 香港地区
      - 🇯🇵 日本地区
      - 🇸🇬 新加坡地区
      - 🇺🇸 美国地区
      - 🚀 节点选择

  - name: 📺 Apple TV 服务
    type: select
    proxies:
      - DIRECT
      - 🇺🇸 美国地区
      - 🇭🇰 香港地区
      - 🇯🇵 日本地区
      - 🇸🇬 新加坡地区
      - 🚀 节点选择

  - name: 🎮 Epic & UE
    type: select
    proxies:
      - DIRECT
      - 🇭🇰 香港地区
      - 🇯🇵 日本地区
      - 🇸🇬 新加坡地区
      - 🇺🇸 美国地区
      - 🚀 节点选择

  - name: 🎯 Steam
    type: select
    proxies:
      - DIRECT
      - 🇭🇰 香港地区
      - 🇯🇵 日本地区
      - 🇸🇬 新加坡地区
      - 🇺🇸 美国地区
      - 🚀 节点选择

  - name: GLOBAL
    type: select
    proxies:
      - 🚀 节点选择
      - DIRECT

